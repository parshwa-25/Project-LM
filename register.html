<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navi">
        <p>Student Registration Form</p>
    </nav>

    <div class="register-container">
        <form action="register.php" method="post">
            <div>
                <label for="sname">Name:</label>
                <input type="text" name="sname" id="name" placeholder="Enter Name" required>
            </div>
            <div>
                <label for="username">Username:</label>
                <input type="text" id="username" name="uname" placeholder="Eg: adam_123" required><br><br>
            <div>
                <label for="password">Password:</label>
                <input type="password" id="password" name="pword" placeholder="Enter Strong Password" required><br><br>
            </div>
            <div>
                <label for="dateOfBirth">Date of Birth:</label>
                <input type="date" id="dateOfBirth" name="dob" required><br><br>
            </div>
            <p>Already a User? <a href="login.html" class="forget">Login here</a></p>
            <button type="submit" id="regBut">Register</button>
        </form>
    </div>
</body>

</html>
